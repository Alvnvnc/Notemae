server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Same-origin API: browser calls /v1/* on this host, nginx forwards to the
    # backend container so no public backend port or CORS setup is needed.
    location /v1/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Third-party libs never change -> cache hard.
    location ^~ /vendor/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Self-hosted fonts are content-stable -> cache hard.
    location ^~ /fonts/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # App shell changes on every deploy -> always revalidate so a new build
    # goes live immediately instead of sitting in the Cloudflare edge cache.
    location ~* \.(?:js|css)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}

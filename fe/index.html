<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b100c" />
    <meta
      name="description"
      content="Notemae Dupe Guide. Find alternatives to your favorite perfumes with note similarity scores, side-by-side comparisons, and honest savings calculations."
    />
    <meta property="og:title" content="Notemae | Perfume Dupe Guide" />
    <meta
      property="og:description"
      content="High-end scent at a sensible price. Similarity scores are based on note composition, not empty claims."
    />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://notemae.pavernor.site/" />
    <title>Notemae | Perfume Dupe Guide</title>

    <link rel="preload" href="/fonts/SpaceGrotesk-var.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/CormorantGaramond-var.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Cat dasar, sengaja inline dan sebelum <link>. Tanpa ini browser mengecat
         jendela dengan warna default-nya (putih) plus markup shell tanpa gaya
         sampai app.css selesai diunduh: satu kedipan putih penuh layar setiap
         kali halaman dimuat langsung, paling terasa di rute yang tidak di-SSR.
         Nilainya duplikat dari --ink-0/--bone dan hanya itu yang boleh di sini. -->
    <style>
      html { background: #0b100c; color-scheme: dark; }
      body { margin: 0; background: #0b100c; color: #ece8dc; }
      #veil { position: fixed; inset: 0; z-index: 70; background: #0b100c; }
      /* Cerminan aturan yang sama di app.css: veil baru boleh tampil setelah
         main.js memasang data-veil. Tanpa kembarannya di sini, rute yang di-SSR
         sempat mengecat veil satu frame sebelum stylesheet dipakai. */
      body:not([data-veil]) #veil { display: none; }
    </style>
    <!-- Stylesheet tidak lagi ditulis tangan di sini: entry-client mengimpor
         app.css, dan Vite menyisipkan <link> ber-hash konten saat build. Itu
         yang menghapus `?v=` manual - nama filenya berubah sendiri kalau
         isinya berubah, jadi cache keras tidak pernah menyajikan versi lama.

         runtime-env.js sengaja tetap di luar bundle: nilainya milik
         deployment, bukan milik build, sehingga satu image Docker bisa
         dipakai di host mana pun. Skrip defer dan modul dieksekusi menurut
         urutan kemunculannya, jadi __SCENTSPHERE_CONFIG__ dijamin sudah ada
         sebelum kode aplikasi membacanya. -->
    <script src="/runtime-env.js" defer></script>
    <script src="/background.js" defer></script>
    <script type="module" src="/src/entry-client.ts"></script>
  </head>
  <body data-loading="true">
    <!-- z-0: WebGL stage, hero only. Statis (bukan React): background.js (defer)
         memasang window.ScentBG ke #bg-canvas saat DOMContentLoaded, sebelum
         React sempat mount - jadi kanvasnya harus sudah ada di HTML. -->
    <div class="stage" id="stage" aria-hidden="true">
      <div class="stage__poster"></div>
      <canvas class="stage__canvas" id="bg-canvas"></canvas>
      <div class="stage__scrim"></div>
    </div>

    <!-- Seluruh chrome (masthead/finder/footer/skip-link), veil, dan rute
         dirender React di sini (react-router). Lihat src/react/. -->
    <div id="root"></div>
  </body>
</html>
